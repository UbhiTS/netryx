# NetScanner on Docker (ideal for a NAS).
#
#   docker compose up -d --build
#   then open  http://<your-NAS-IP>:8765
#
# HOST networking is required: a bridged container is isolated on its own
# virtual network and cannot discover devices on your real LAN (no ARP, no
# ping sweep visibility, no mDNS/SNMP). network_mode: host fixes that.

services:
  netscanner:
    build: .
    image: netscanner:latest
    container_name: netscanner
    network_mode: host          # REQUIRED — see your real LAN. Do not change to bridge.
    cap_add:
      - NET_RAW                 # ICMP ping only; not required (TCP discovery works without it).
                                # No privileged mode needed.
    environment:
      - NETSCANNER_HOST=0.0.0.0
      - NETSCANNER_PORT=8765    # change if 8765 is taken on the NAS
      - NETSCANNER_NO_BROWSER=1
      # --- Optional: lock down access (dashboard + API + MCP) ---
      # - NETSCANNER_USER=admin                   # dashboard login user (default admin)
      # - NETSCANNER_PASS=change-me               # set a password to REQUIRE login (turns auth on)
      # - NETSCANNER_TRUST_LOCALHOST=1            # 1=skip auth for 127.0.0.1; set 0 behind a same-host reverse proxy
      # - NETSCANNER_TOKEN=change-me              # legacy static bearer token (or create tokens in the UI)
      # --- Optional: proactive alerts ---
      # - NETSCANNER_WEBHOOK=https://hooks.example.com/netscanner
      # - NETSCANNER_MQTT=192.168.1.10:1883       # broker host or host:port
      # - NETSCANNER_MQTT_TOPIC=netscanner/events
      # - NETSCANNER_MQTT_USER=user
      # - NETSCANNER_MQTT_PASS=pass
    volumes:
      - ./netscanner-data:/data # history, names/notes, vendor DB, baseline, events
    restart: unless-stopped
