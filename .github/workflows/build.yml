name: build

# Build the Docker image + standalone Windows .exe.
# Publishing a GitHub Release (or pushing a version tag) also attaches the .exe,
# a docker-image.txt, and the GHCR pull commands to that release.
on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # publish/update the Release + attach assets
  packages: write   # push the Docker image to GHCR

jobs:
  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # On a release/tag -> :v1.2.3, :1.2.3, :latest ; on a branch -> :main, :sha-xxxx
      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=auto
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  windows-exe:
    name: Standalone Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build NetScanner.exe
        run: pyinstaller --onefile --name NetScanner --console --add-data "ui.html;." netscanner.py
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetScanner-windows-exe
          path: dist/NetScanner.exe
          if-no-files-found: error

      # When a release is published (or a version tag is pushed), build the asset
      # list + notes that tell users exactly which GHCR image/tag to pull.
      - name: Prepare release assets & notes
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          IMG="ghcr.io/${GITHUB_REPOSITORY,,}"
          VER="${GITHUB_REF_NAME}"
          printf 'NetScanner Docker image (GitHub Container Registry)\n\nPull:\n  docker pull %s:%s\n  docker pull %s:latest\n\nRun (NAS/server, host networking required):\n  docker run -d --name netscanner --network host --cap-add NET_RAW --cap-add NET_ADMIN -v "$PWD/netscanner-data:/data" --restart unless-stopped %s:%s\n' "$IMG" "$VER" "$IMG" "$IMG" "$VER" > docker-image.txt
          {
            echo "### Docker image (GHCR)"
            echo ""
            echo '```'
            echo "docker pull ${IMG}:${VER}"
            echo "docker pull ${IMG}:latest"
            echo '```'
            echo ""
            echo "Run on a NAS/server (host networking required):"
            echo '```'
            echo "docker run -d --name netscanner --network host --cap-add NET_RAW --cap-add NET_ADMIN -v \"\$PWD/netscanner-data:/data\" --restart unless-stopped ${IMG}:${VER}"
            echo '```'
            echo ""
            echo "### Windows"
            echo "Download **NetScanner.exe** from the assets below (unsigned — SmartScreen may warn on first run)."
          } > release_notes.md
      - name: Publish release (attach exe + docker-image.txt, append pull notes)
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/NetScanner.exe
            docker-image.txt
          body_path: release_notes.md
          append_body: true
          make_latest: "true"