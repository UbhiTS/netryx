name: build

# Build the Docker image and the standalone Windows .exe on every push / PR.
# Push a version tag (e.g. v0.0.1) to also publish a GitHub Release + versioned image.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # publish the Release + attach the .exe on version tags
  packages: write   # push the Docker image to GHCR

jobs:
  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action lowercases the image name and computes the tag set:
      #   - on a version tag v0.0.1  ->  :v0.0.1, :0.0.1, :latest, :sha-xxxxxxx
      #   - on a branch push (main)  ->  :main, :sha-xxxxxxx   (NOT :latest)
      # 'latest=auto' moves :latest to the NEWEST version tag and off the older ones.
      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=auto
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  windows-exe:
    name: Standalone Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build NetScanner.exe
        run: pyinstaller --onefile --name NetScanner --console --add-data "ui.html;." netscanner.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetScanner-windows-exe
          path: dist/NetScanner.exe
          if-no-files-found: error

      # On a version tag: publish a GitHub Release with the .exe and mark it "Latest".
      # GitHub automatically un-marks the previous release as Latest.
      - name: Publish release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NetScanner.exe
          make_latest: "true"
          generate_release_notes: true
