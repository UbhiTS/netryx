name: build

# Build the Docker image and the standalone Windows .exe on every push / PR.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # attach the .exe to a GitHub Release on version tags
  packages: write   # push the Docker image to GHCR (GitHub Container Registry)

jobs:
  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GHCR requires a lowercase image path; owner names may contain capitals.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds on every event; only pushes on non-PR events (forked PRs can't push).
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  windows-exe:
    name: Standalone Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      # ui.html is bundled into the exe (the app reads it at runtime).
      - name: Build NetScanner.exe
        run: pyinstaller --onefile --name NetScanner --console --add-data "ui.html;." netscanner.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetScanner-windows-exe
          path: dist/NetScanner.exe
          if-no-files-found: error

      # Pushing a tag like v1.0.0 also publishes the exe on a GitHub Release.
      - name: Attach exe to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NetScanner.exe
